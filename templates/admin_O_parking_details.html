<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Occupied Parking Spot Details</h1>
    <form action="">
        <label for="id">Price(Per hour): </label>
        <input type="number" id="id" name="id" value="{{ O_spot.spot_id }}" required readonly>
        <br>
        <label for="customer_id">Customer ID: </label>
        <input type="number" id="customer_id" name="customer_id" value="{{ O_spot.user_id }}" required readonly>
        <br>
        <label for="vehicle_no">vehicle_no: </label>
        <input type="text" id="vehicle_no" name="vehicle_no" value="{{ O_spot.vehicle_num }}" required readonly>
        <br>
        <label for="date">Date/time of parking: </label>
        <input type="datetime-local" id="date" name="date" value="{{ O_spot.booking_time.strftime('%Y-%m-%dT%H:%M') }}" required readonly>
        <br>
        <label for="cost">Est. parking cost: </label>
        <input type="number" id="id" name="id" value="{{ total_cost }}" required readonly>
        <br>
    </form>
</body>

</html>
