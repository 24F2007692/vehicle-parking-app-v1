<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        nav>p {
            font-size: 24px;
            font-family: fantasy;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .center-nav {
            display: flex;
            gap: 20px;
        }

        li {
            list-style: none;
        }

        a {
            color: black;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <nav>
        <p>Welcome to User</p>
        <ul class="center-nav">
            <li><a href="/">home</a></li> |
            <li><a href="">Summary</a></li> |
            <li><a href="/logout">Logout</a></li>
        </ul>
        <a href="">EditProfile</a>
    </nav>
</body>

</html>
