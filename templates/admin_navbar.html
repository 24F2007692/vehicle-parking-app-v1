<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        nav>p {
            font-size: 31px;
            /* font-weight: 700; */
            font-family: fantasy;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 17px 28px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .center-nav {
            display: flex;
            gap: 23px;
            margin-right: 57px;

        }

        li {
            list-style: none;
        }

        nav>ul>li>a {
            font-size: 20px;
            color: white;
            text-decoration: none;
        }

        .profile {
            display: flex;
            flex-direction: column-reverse;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <nav>
        <p>SmartParkr</p>
        <ul class="center-nav">
            <li><a href="/dashboard">Home</a></li>
            <li><a href="/allusers">Users</a></li>
            <li><a href="/search">Search</a></li>
            <li><a href="#">Summary</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
        <div class="profile">
            <a style="color: white; text-decoration: none;" href="#">EditProfile</a>
            <img style="width: 23px;" src="../static/images/no-profile-picture-15257.png" alt="">

        </div>

    </nav>

</body>

</html>
