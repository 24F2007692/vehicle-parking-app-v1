<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartParkr - Welcome</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url(https://img.freepik.com/premium-photo/parking-management-system-green-background-solid-color-background-4k-ultra-hd_964851-139748.jpg?w=826);
      background-size: cover;
      background-position: center;
      /* filter: blur(8px); */
      z-index: -1;
    }

    .buttons {
      display: flex;
      gap: 15px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      text-align: center;
      align-items: center;
    }

    .button {
      padding: 10px 30px;
      border: none;
      border-radius: 20px;
      background-color: #008000;
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.3s;
    }

    .button:hover {
      background-color: #006400;
    }
  </style>
</head>

<body>
  <div class="buttons">
    <h1>Welcome To <strong>SmartParkr</strong></h1>
    <a class="button" href="/login">Login</a>
    <a class="button" href="/signup">Signup</a>
  </div>
</body>

</html>
